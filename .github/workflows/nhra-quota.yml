name: NHRA Quota Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: nhra-quota-watch
  cancel-in-progress: true

jobs:
  run-watch:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run watcher
        run: |
          python nhra_github_script_with_json.py

      - name: Show generated JSON
        run: |
          ls -la
          ls -la docs || true
          cat docs/quota_data.json || true
          
      - name: Show generated JSON timestamp
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("docs/quota_data.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          print("last_checked:", data.get("last_checked"))
          print("generated_epoch:", data.get("generated_epoch"))
          PY
          
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/quota_data.json
          git status
          if git diff --staged --quiet; then
            echo "No staged changes to commit"
          else
            git commit -m "Update quota data"
            git push
          fi
